name: oracle_server
description: >-
  Oracle AI MCP server entrypoint. Bootstraps configuration and dependency
  injection, then runs pending database migrations on startup. The MCP tool
  surface is wired here (next step).
version: 0.1.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  oracle_core:
  oracle_migration:
  oracle_memory:
  mcp_dart: '>=0.7.0 <1.0.0'
  shelf: '>=1.4.0 <2.0.0'
  shelf_router: '>=1.1.0 <2.0.0'
  archive: ^4.0.9

dev_dependencies:
  lints: '>=4.0.0 <6.0.0'
  test: '>=1.24.0 <2.0.0'
